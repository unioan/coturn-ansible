# ================================================================
# PRIMARY SETTINGS — edit these, everything else derives from them
# ================================================================

# Public IP of the server
server_ip: "188.137.229.86"

# Domain name for TLS certificate and TURN realm
domain: "webrtc.valdi.sarl"

# ================================================================
# Derived values — no need to change these normally
# ================================================================

# ---- Network ----
external_ip: "{{ server_ip }}"
relay_ip: "{{ server_ip }}"
listening_ip: "0.0.0.0"

# ---- Certificate source ----
# certbot — install certbot and obtain certificate automatically (port 80 must be free)
# manual  — certificate already exists, specify the directory path below
cert_source: "certbot"
# manual_cert_root   — root directory mounted into container
# manual_cert_subdir — subdirectory inside root containing the certificate files
# Works with Let's Encrypt and purchased certificates.
# For purchased certificates: files must be named fullchain.pem and privkey.pem
# Symlinks are allowed if their targets are also inside manual_cert_root
manual_cert_root: "/var/letsencrypt"
manual_cert_subdir: "webrtc.valdi.sarl"

# certbot settings (used when cert_source=certbot)
certbot_domain: "{{ domain }}"
certbot_email: "admin@{{ domain }}"
letsencrypt_root: "/etc/letsencrypt"

# ---- TURN settings ----
realm: "{{ domain }}"
# password — long-term credentials (lt-cred-mech), рекомендуется для продакшена
# noauth   — открытый релей без пароля, только для тестов в изолированной сети
auth_mode: "password"

# Relay port range — each port = 1 concurrent TURN allocation (1 call)
min_port: 49152
max_port: 49452

# TURN session quotas
# total_quota — max simultaneous allocations across all users (must be <= port range size)
# user_quota  — max simultaneous allocations per user
total_quota: 100
user_quota: 20

# Max bandwidth per TURN allocation (bits per second)
# 0         — no limit
# 1048576   — 1 Mbit/s per session
# 2097152   — 2 Mbit/s per session
max_bps: 0

# Mobility support for clients that change IP mid-call (e.g. WiFi → 4G)
# true  — allow IP change without dropping the call (RFC 8016)
# false — disable, slightly reduces attack surface
mobility: false

# ---- Logging ----
# Options: normal, verbose, Verbose
log_level: "verbose"
# Enable Docker json-file log rotation (max-size: 10m, max-file: 3)
log_rotation: true

# ---- Deployment ----
coturn_dir: "/opt/coturn"
coturn_image: "coturn/coturn:4.6.3"
